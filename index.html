<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f9ff; }
        .task-card { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-lg mx-auto">
        <h1 class="text-2xl font-bold text-blue-600 mb-4">📋 任务管理系统</h1>
        <p class="text-gray-600 mb-4">如果看到这个页面，说明网站部署成功！</p>
        <div class="bg-white rounded-2xl p-4 shadow">
            <input type="text" placeholder="输入任务..." class="w-full p-2 border rounded">
            <button class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">添加任务</button>
        </div>
        <div class="mt-4 text-sm text-gray-500">
            ✅ 当前时间: <script>document.write(new Date().toLocaleString())</script>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Task Manager Pro · 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .sync-container { width: 100%; max-width: 1280px; margin: 0 auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; cursor: pointer; position: relative; border-radius: 12px; }
        .in-range { background-color: #eff6ff; color: #3b82f6; border-radius: 0; }
        .range-start { background-color: #3b82f6 !important; color: white !important; border-radius: 999px 0 0 999px !important; }
        .range-end { background-color: #3b82f6 !important; color: white !important; border-radius: 0 999px 999px 0 !important; }
        .range-single { background-color: #3b82f6 !important; color: white !important; border-radius: 999px !important; }
        .day-progress-dot { position: absolute; bottom: 6px; width: 4px; height: 4px; border-radius: 50%; background: #cbd5e1; }
        .day-progress-dot.filled { background: #3b82f6; }
        .task-card { animation: fadeIn 0.3s ease-out forwards; transition: all 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .note-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 10px;
            color: #f97316;
            font-style: italic;
            padding: 2px 0;
        }
        .note-input:focus {
            background: rgba(249, 115, 22, 0.05);
            border-bottom: 1px dashed #f97316;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="sync-container space-y-6">
    <div class="flex justify-between items-center px-4">
        <div id="modeStatus" class="text-[10px] font-black tracking-widest uppercase py-1 px-3 rounded-full bg-slate-200 text-slate-500">Connecting...</div>
        <div class="text-[10px] font-black text-blue-600 uppercase">March 2026</div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
        <div class="lg:w-80 w-full shrink-0 space-y-6">
            <div class="glass border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-slate-800">日历选择</h2>
                    <button onclick="resetSelection()" class="text-[10px] font-bold text-blue-500 hover:underline">重置</button>
                </div>
                <div id="calendar" class="calendar-grid"></div>
            </div>

            <div class="glass border border-red-100 rounded-[2rem] p-6 shadow-sm bg-red-50/20">
                <h3 class="font-black text-red-500 text-sm mb-4 flex justify-between items-center">
                    逾期提醒 <span id="pendingCount" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
                </h3>
                <div id="pendingList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="flex-1 space-y-6">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="搜索任务、负责人..." 
                       class="flex-1 bg-white border border-slate-200 rounded-[1.5rem] px-6 py-4 outline-none focus:ring-2 ring-blue-500/20 font-medium text-slate-700">
                <button onclick="jumpToToday()" class="bg-slate-900 text-white px-6 rounded-[1.5rem] font-bold text-sm hover:bg-slate-800">今天</button>
            </div>

            <div class="bg-white border border-slate-200 rounded-[2rem] shadow-sm overflow-hidden">
                <textarea id="taskInput" placeholder="格式：内容-负责人-3.21（备注）" rows="4"
                          class="w-full p-6 outline-none text-slate-700 resize-none placeholder:text-slate-300"></textarea>
                <div class="bg-slate-50/80 px-6 py-3 border-t border-slate-100 flex justify-end">
                    <button onclick="addTask()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-black text-sm hover:bg-blue-700 shadow-lg shadow-blue-200">发布任务</button>
                </div>
            </div>

            <div class="px-2">
                <div id="rangeInfo" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">所有任务</div>
                <div id="taskList" class="space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    firebase: {
        apiKey: "AIzaSyCxlWekKnhzxHOingyLDK97gwJQMAMmd9Q",
        authDomain: "project-960311529821268991.firebaseapp.com",
        databaseURL: "https://project-960311529821268991-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "project-960311529821268991",
        storageBucket: "project-960311529821268991.firebasestorage.app",
        messagingSenderId: "937001668869",
        appId: "1:937001668869:web:7fbc269aba4bfd68e1a76c"
    }
};

let allTasks = {};
let startDate = null, endDate = null, isDragging = false;
const todayStr = new Date().toISOString().split('T')[0];

function getOwnerColor(name) {
    const colors = ['#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777', '#0891b2', '#e11d48'];
    let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
}

async function init() {
    if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
    firebase.database().ref("tasks").on("value", snap => {
        allTasks = snap.val() || {};
        renderAll();
    });
    document.getElementById("modeStatus").innerText = "Cloud Synced";
}

function addTask() {
    const ipt = document.getElementById("taskInput");
    const raw = ipt.value.trim();
    if (!raw) return;
    raw.split('\n').forEach((line, i) => {
        let content = line.trim();
        if (!content) return;
        content = content.replace(/^\d+([、.．])\s*/, '');
        const parts = content.split('-');
        let finalContent = parts[0] ? parts[0].trim() : content;
        let owner = parts[1] ? parts[1].trim() : "Team";
        let deadline = todayStr, note = "";
        if (parts[2]) {
            const dateMatch = parts[2].match(/(\d{1,2})\.(\d{1,2})/);
            if (dateMatch) deadline = `2026-${dateMatch[1].padStart(2, '0')}-${dateMatch[2].padStart(2, '0')}`;
            const noteMatch = parts[2].match(/[（\(](.*?)[）\)]/);
            if (noteMatch) note = noteMatch[1];
        }
        firebase.database().ref("tasks/" + (Date.now() + i)).set({
            content: finalContent, owner, deadline, note, completed: false, timestamp: Date.now()
        });
    });
    ipt.value = "";
}

function createTaskCard(t, isMini = false) {
    const nameColor = getOwnerColor(t.owner);
    const div = document.createElement("div");
    div.className = `task-card glass ${isMini ? 'p-3' : 'p-5'} rounded-[1.5rem] border border-slate-200 flex items-center gap-4 transition-all ${t.completed ? 'opacity-40' : ''}`;
    div.innerHTML = `
        <div onclick="toggleTask('${t.id}')" class="w-7 h-7 rounded-full border-2 border-slate-200 cursor-pointer flex items-center justify-center shrink-0 ${t.completed ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white'}">
            ${t.completed ? '✓' : ''}
        </div>
        <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
                <span class="font-bold text-slate-800 truncate text-sm">${t.content}</span>
                <button onclick="editContent('${t.id}')" class="text-slate-300 hover:text-blue-500 text-xs transition-colors">✎</button>
                <span class="text-[11px] font-normal shrink-0" style="color: ${nameColor}">${t.owner}</span>
            </div>
            <input type="text" class="note-input" placeholder="点击添加备注..." value="${t.note || ''}" onblur="updateNote('${t.id}', this.value)" onkeydown="if(event.key==='Enter') this.blur()">
            <div class="text-[10px] text-slate-400 font-bold uppercase mt-1 cursor-pointer hover:text-blue-500" onclick="editDate('${t.id}')">${t.deadline}</div>
        </div>
        <button onclick="deleteTask('${t.id}')" class="text-slate-300 hover:text-red-400 text-2xl px-1">&times;</button>
    `;
    return div;
}

function updateNote(id, newNote) { firebase.database().ref(`tasks/${id}/note`).set(newNote); }

function editContent(id) {
    const t = allTasks[id];
    const nextContent = prompt("修改任务内容:", t.content);
    if (nextContent === null) return;
    const nextOwner = prompt("修改负责人:", t.owner);
    if (nextOwner === null) return;
    firebase.database().ref(`tasks/${id}`).update({ content: nextContent || t.content, owner: nextOwner || t.owner });
}

function editDate(id) {
    const current = allTasks[id].deadline;
    const next = prompt("修改日期 (YYYY-MM-DD):", current);
    if (next && next !== current) firebase.database().ref(`tasks/${id}/deadline`).set(next);
}

function renderAll() {
    renderCalendar();
    const taskList = document.getElementById("taskList"), pendingList = document.getElementById("pendingList");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const arr = Object.entries(allTasks).map(([id, v]) => ({ id, ...v }));
    let filtered = arr.filter(t => t.content.toLowerCase().includes(search) || t.owner.toLowerCase().includes(search));
    if (startDate && endDate) filtered = filtered.filter(t => t.deadline >= startDate && t.deadline <= endDate);
    else if (startDate) filtered = filtered.filter(t => t.deadline === startDate);
    filtered.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        if (a.deadline !== b.deadline) return a.deadline.localeCompare(b.deadline);
        return b.timestamp - a.timestamp;
    });
    taskList.innerHTML = "";
    filtered.forEach(t => taskList.appendChild(createTaskCard(t)));
    const overdue = arr.filter(t => !t.completed && t.deadline < todayStr).sort((a, b) => a.deadline.localeCompare(b.deadline));
    document.getElementById("pendingCount").innerText = overdue.length;
    pendingList.innerHTML = "";
    overdue.forEach(t => pendingList.appendChild(createTaskCard(t, true)));
}

function renderCalendar() {
    const grid = document.getElementById("calendar"); grid.innerHTML = "";
    const year = 2026, month = 2; // March
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay() || 7;
    ["一", "二", "三", "四", "五", "六", "日"].forEach(w => {
        const el = document.createElement("div"); el.className = "text-center text-[10px] font-black text-slate-300 py-2"; el.innerText = w; grid.appendChild(el);
    });
    for (let i = 1; i < firstDay; i++) grid.appendChild(document.createElement("div"));
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `2026-03-${String(d).padStart(2, '0')}`;
        const dayEl = document.createElement("div"); dayEl.dataset.date = dateStr; dayEl.className = "calendar-day";
        if (startDate && endDate) {
            if (dateStr === startDate) dayEl.classList.add("range-start");
            else if (dateStr === endDate) dayEl.classList.add("range-end");
            else if (dateStr > startDate && dateStr < endDate) dayEl.classList.add("in-range");
        } else if (startDate && dateStr === startDate) dayEl.classList.add("range-single");
        if (dateStr === todayStr && !dayEl.classList.contains('range-single')) { dayEl.style.border = "1px solid #3b82f6"; dayEl.style.color = "#3b82f6"; }
        if (Object.values(allTasks).some(t => t.deadline === dateStr)) { 
            const dot = document.createElement("div"); dot.className = "day-progress-dot filled"; dayEl.appendChild(dot); 
        }
        dayEl.innerText = d;
        dayEl.onmousedown = () => { isDragging = true; startDate = dateStr; endDate = null; renderAll(); };
        dayEl.onmouseenter = () => { if (isDragging) { if (dateStr < startDate) { endDate = startDate; startDate = dateStr; } else { endDate = dateStr; } renderAll(); } };
        grid.appendChild(dayEl);
    }
}

window.onmouseup = () => isDragging = false;
function toggleTask(id) { firebase.database().ref(`tasks/${id}/completed`).set(!allTasks[id].completed); }
function deleteTask(id) { if (confirm("确定删除？")) firebase.database().ref(`tasks/${id}`).remove(); }
function resetSelection() { startDate = null; endDate = null; renderAll(); }
function jumpToToday() { startDate = todayStr; endDate = null; renderAll(); }
document.getElementById("searchInput").oninput = renderAll;
init();
</script>
</body>
</html>

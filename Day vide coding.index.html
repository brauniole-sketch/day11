<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>任务管理系统 · 双模式版</title>
    <!-- Firebase 9.22.0 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Tailwind + 额外库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { transition: background 0.3s ease; background-color: #f8fafc; }
        .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .task-card { animation: fadeSlide 0.25s ease-out; }
        @keyframes fadeSlide { 0% { opacity:0; transform: translateY(6px); } 100% { opacity:1; transform: translateY(0); } }
        .check-square { transition: all 0.15s; }
        .notification { position: fixed; top: 16px; right: 16px; z-index: 9999; max-width: 260px; }
        .mode-tag { position: fixed; top: 16px; left: 16px; padding: 4px 14px; border-radius: 40px; font-size: 12px; font-weight: 700; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .cloud-mode { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .local-mode { background: #fef9c3; color: #b45309; border: 1px solid #fde68a; }
        .calendar-day { transition: 0.1s; border-radius: 30px; font-weight: 500; }
        .calendar-day.active { background: #2563eb; color: white; font-weight: 600; }
        .calendar-day:active { background: #dbeafe; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .footer-progress { padding-bottom: env(safe-area-inset-bottom, 0.5rem); }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-24">

<!-- 模式提示标签 (左上角) -->
<div id="modeTag" class="mode-tag hidden"></div>

<!-- 通知容器 -->
<div id="notification-container" class="notification space-y-2"></div>

<div class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">

    <!-- ====================== 左侧整月日历 ====================== -->
    <div class="lg:w-72 w-full glass rounded-3xl p-4 shadow-sm h-fit sticky top-4">
        <div class="text-sm font-bold text-slate-500 mb-2 px-1">2026年3月</div>
        <div id="fullMonthCalendar" class="grid grid-cols-7 gap-1 text-center text-sm"></div>
    </div>

    <!-- ====================== 右侧主内容 ====================== -->
    <div class="flex-1">
        <nav class="flex items-center justify-between mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 glass">
            <div class="flex flex-col">
                <input type="date" id="datePicker" class="font-extrabold text-slate-800 bg-transparent border-none outline-none text-xl">
                <div class="flex items-center gap-2">
                    <span id="sync-status" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span class="text-[10px] font-black text-blue-600 tracking-widest uppercase">Task Manager</span>
                </div>
            </div>
            <div class="flex gap-2 flex-wrap justify-end">
                <button onclick="exportTasksToExcel()" class="px-3 py-2 bg-purple-600 text-white rounded-xl text-xs font-bold">导出</button>
                <button onclick="importTasksFromExcel()" class="px-3 py-2 bg-green-600 text-white rounded-xl text-xs font-bold">导入</button>
                <button onclick="analyzeTasksWithZhipu()" class="px-3 py-2 bg-orange-600 text-white rounded-xl text-xs font-bold">AI分析</button>
                <button onclick="jumpToToday()" class="px-3 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold">今天</button>
            </div>
        </nav>

        <div class="flex gap-3 mb-6">
            <input type="text" id="searchInput" placeholder="🔍 搜索任务..." 
                   class="flex-1 px-5 py-3 rounded-2xl border-none outline-none bg-white/70 glass">
            <div class="flex gap-1 p-1 bg-slate-200/60 rounded-2xl w-fit">
                <button onclick="setView('day')" id="btn-day" class="px-5 py-2 text-xs font-bold rounded-xl bg-white shadow-sm">日</button>
                <button onclick="setView('week')" id="btn-week" class="px-5 py-2 text-xs font-bold rounded-xl text-slate-500">周</button>
                <button onclick="setView('month')" id="btn-month" class="px-5 py-2 text-xs font-bold rounded-xl text-slate-500">月</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden mb-8">
            <textarea id="taskInput" placeholder="输入任务，一行一个&#10;格式: 任务名-负责人-3.21  (日期自动识别)&#10;Enter发布 | Shift+Enter换行" rows="5"
                      class="w-full px-6 py-5 border-none outline-none text-sm resize-none bg-transparent"></textarea>
            <div class="bg-slate-50 px-4 py-3 flex justify-between items-center border-t">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Local/Cloud 双模式</span>
                <button onclick="processInput()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">发布任务</button>
            </div>
        </div>

        <div id="ai-analysis-result" class="mb-6 glass p-5 rounded-2xl hidden">
            <h3 class="font-bold text-slate-800 mb-2 flex items-center gap-2">🤖 AI 分析结果</h3>
            <div id="ai-analysis-content" class="text-sm text-slate-600"></div>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>
</div>

<!-- 底部进度条 -->
<footer class="fixed bottom-0 left-0 w-full px-4 pb-3 pt-1 footer-progress">
    <div class="glass border border-white/50 p-2 rounded-2xl flex justify-between items-center px-5 max-w-md mx-auto shadow-lg">
        <span class="text-[10px] font-bold text-slate-400 uppercase">进度</span>
        <div class="flex-1 mx-3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-blue-600 transition-all w-0"></div>
        </div>
        <span id="progress-text" class="text-[10px] font-bold text-slate-900">0%</span>
    </div>
</footer>

<script>
// ====================== 全局配置 ======================
const CONFIG = {
    firebase: {
        apiKey: "AIzaSyCxlWekKnhzxHOingyLDK97gwJQMAMmd9Q",
        authDomain: "project-960311529821268991.firebaseapp.com",
        databaseURL: "https://project-960311529821268991-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "project-960311529821268991",
        storageBucket: "project-960311529821268991.firebasestorage.app",
        messagingSenderId: "937001668869",
        appId: "1:937001668869:web:7fbc269aba4bfd68e1a76c"
    },
    zhipu: {
        apiKey: "744ecba512fa4658bab1c8279865abf8.o6dz82Tno9jY6iUP",
        apiUrl: "https://open.bigmodel.cn/api/paas/v4/chat/completions",
        model: "glm-4"
    },
    localStorageKey: "task_management_system_v1",
    firebaseTimeout: 5000
};

let currentMode = "local";
let firebaseDB = null;
let allTasks = {};
let currentView = "day";
const now = new Date();
const todayStr = now.toISOString().split('T')[0];

// ====================== 工具 ======================
function padStart(str, len, ch) {
    str = String(str);
    while (str.length < len) str = ch + str;
    return str;
}
function showNotification(msg, type = "info") {
    const c = { success: "bg-green-500", info: "bg-blue-500", warning: "bg-yellow-500", error: "bg-red-500" };
    const div = document.createElement("div");
    div.className = `${c[type]} text-white px-4 py-2 rounded-lg text-sm mb-2 shadow-lg`;
    div.innerText = msg;
    document.getElementById("notification-container").appendChild(div);
    setTimeout(() => div.remove(), 3000);
}
function parseDateFromLine(line) {
    const m = line.match(/-(\d{1,2}\.\d{1,2})$/);
    if (m) {
        const [a, b] = m[1].split('.');
        return `2026-${padStart(a,2,'0')}-${padStart(b,2,'0')}`;
    }
    return todayStr;
}

// ====================== 整月日历生成 ======================
function renderFullMonthCalendar() {
    const container = document.getElementById("fullMonthCalendar");
    if (!container) return;
    container.innerHTML = "";
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const firstWeekDay = firstDay.getDay() || 7;

    const weekNames = ["一", "二", "三", "四", "五", "六", "日"];
    weekNames.forEach(w => {
        const el = document.createElement("div");
        el.className = "font-bold text-xs text-slate-500 py-1";
        el.innerText = w;
        container.appendChild(el);
    });

    for (let i = 1; i < firstWeekDay; i++) {
        const empty = document.createElement("div");
        container.appendChild(empty);
    }

    const currentDate = document.getElementById("datePicker").value;

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${padStart(month+1,2,'0')}-${padStart(d,2,'0')}`;
        const dayEl = document.createElement("div");
        dayEl.className = `calendar-day py-2 rounded-lg cursor-pointer text-sm ${dateStr === currentDate ? 'active' : ''}`;
        dayEl.innerText = d;
        dayEl.onclick = () => {
            document.getElementById("datePicker").value = dateStr;
            setView('day');
            renderTasks();
            renderFullMonthCalendar();
        };
        container.appendChild(dayEl);
    }
}

// ====================== 初始化 & 双模式 ======================
async function init() {
    document.getElementById("datePicker").value = todayStr;
    renderFullMonthCalendar();
    try {
        await initFirebase();
        currentMode = "cloud";
        updateModeUI();
        showNotification("已连接云端", "success");
    } catch (e) {
        currentMode = "local";
        updateModeUI();
        loadLocalTasks();
        showNotification("本地模式 (无VPN可用)", "warning");
    }
    initEventListeners();
    renderTasks();
}

async function initFirebase() {
    return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject("超时"), CONFIG.firebaseTimeout);
        try {
            if (!firebase.apps.length) firebase.initializeApp(CONFIG.firebase);
            firebaseDB = firebase.database().ref("tasks");
            firebaseDB.once("value").then(s => {
                clearTimeout(timer);
                allTasks = s.val() || {};
                firebaseDB.on("value", snap => { allTasks = snap.val() || {}; renderTasks(); });
                document.getElementById("sync-status").className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                resolve();
            }).catch(reject);
        } catch (e) { clearTimeout(timer); reject(e); }
    });
}
function loadLocalTasks() {
    allTasks = JSON.parse(localStorage.getItem(CONFIG.localStorageKey)) || {};
    document.getElementById("sync-status").className = "w-2 h-2 rounded-full bg-yellow-500";
}
function saveLocalTasks() {
    localStorage.setItem(CONFIG.localStorageKey, JSON.stringify(allTasks));
}
function updateModeUI() {
    const tag = document.getElementById("modeTag");
    tag.classList.remove("hidden");
    if (currentMode === "cloud") {
        tag.className = "mode-tag cloud-mode";
        tag.innerText = "☁️ 云端模式";
    } else {
        tag.className = "mode-tag local-mode";
        tag.innerText = "📱 本地模式";
    }
}

// ====================== 任务操作 ======================
function processInput() {
    const ipt = document.getElementById("taskInput");
    const raw = ipt.value.trim();
    if (!raw) return showNotification("请输入内容", "warning");
    const lines = raw.split("\n");
    const adds = {};
    lines.forEach(line => {
        let t = line.trim().replace(/^\d+[、.\s]+/, '');
        if (!t) return;
        const deadline = parseDateFromLine(t);
        const parts = t.split('-');
        let owner = "全员", content = t;
        if (parts.length >= 3) { owner = parts[parts.length-2].trim(); content = parts.slice(0,-2).join('-').trim(); }
        else if (parts.length === 2) { owner = parts[1].trim(); content = parts[0].trim(); }
        const id = Date.now() + Math.random().toString(36).slice(2);
        adds[id] = { content, owner, deadline, completed: false, timestamp: Date.now() };
    });
    allTasks = { ...allTasks, ...adds };
    if (currentMode === "cloud" && firebaseDB) {
        firebaseDB.set(allTasks).then(() => showNotification("发布成功")).catch(() => saveLocalTasks());
    } else {
        saveLocalTasks();
        showNotification("本地保存成功");
    }
    ipt.value = "";
    renderTasks();
}
function toggleTask(id) {
    allTasks[id].completed = !allTasks[id].completed;
    if (currentMode === "cloud" && firebaseDB) {
        firebaseDB.child(id).update({completed: allTasks[id].completed});
    } else {
        saveLocalTasks();
    }
    renderTasks();
}
function deleteTask(id) {
    if (!confirm("确定删除？")) return;
    delete allTasks[id];
    if (currentMode === "cloud" && firebaseDB) {
        firebaseDB.child(id).remove();
    } else {
        saveLocalTasks();
    }
    showNotification("已删除");
    renderTasks();
}

// ====================== 渲染 ======================
function renderTasks() {
    renderFullMonthCalendar();
    const list = document.getElementById("taskList");
    const viewDate = document.getElementById("datePicker").value;
    const search = document.getElementById("searchInput").value.toLowerCase();
    let arr = Object.entries(allTasks).map(([id,v])=>({id,...v}));
    
    arr = arr.filter(t => t.content.toLowerCase().includes(search) || t.owner.toLowerCase().includes(search));
    
    arr = arr.filter(t => {
        const td = t.deadline;
        if (currentView === "day") return td === viewDate;
        if (currentView === "month") return td.slice(0,7) === viewDate.slice(0,7);
        if (currentView === "week") {
            const vd = new Date(viewDate);
            const fd = new Date(vd); fd.setDate(vd.getDate() - (vd.getDay()||7)+1);
            const ld = new Date(fd); ld.setDate(fd.getDate()+6);
            const dt = new Date(td);
            return dt >= fd && dt <= ld;
        }
        return true;
    });

    // 排序
    if (currentView === "day") {
        arr.sort((a,b)=>b.timestamp - a.timestamp);
    } else {
        arr.sort((a,b)=>{
            if (a.deadline < b.deadline) return -1;
            if (a.deadline > b.deadline) return 1;
            return b.timestamp - a.timestamp;
        });
    }

    list.innerHTML = "";
    if (arr.length === 0) { 
        list.innerHTML = '<div class="text-center py-10 text-slate-400">✨ 暂无任务，添加一条吧</div>'; 
        updateProgress([]); 
        return; 
    }
    arr.forEach(t => {
        const div = document.createElement("div");
        div.className = `task-card glass p-5 rounded-3xl flex items-start gap-4 ${t.completed?'opacity-50':''}`;
        div.innerHTML = `
            <div onclick="toggleTask('${t.id}')" class="check-square w-9 h-9 rounded-xl border-2 cursor-pointer flex items-center justify-center ${t.completed?'bg-green-500 border-green-500 text-white':'border-slate-200 text-transparent'}">✔</div>
            <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap"><span class="font-bold ${t.completed?'line-through':''}">${t.content}</span><span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-[10px] rounded-md">${t.owner}</span></div>
                <p class="text-[10px] text-slate-400 mt-1">📅 ${t.deadline}</p>
            </div>
            <button onclick="deleteTask('${t.id}')" class="text-slate-300 hover:text-red-500 text-lg w-8 h-8 flex items-center justify-center">✕</button>
        `;
        list.appendChild(div);
    });
    updateProgress(arr);
}
function updateProgress(tasks) {
    const total = tasks.length;
    const ok = tasks.filter(t=>t.completed).length;
    const p = total ? Math.round(ok/total*100) : 0;
    document.getElementById("progress-bar").style.width = p+"%";
    document.getElementById("progress-text").innerText = p+"%";
}

// ====================== Excel导入导出 ======================
function exportTasksToExcel() {
    const arr = Object.values(allTasks).map(t=>({任务:t.content,负责人:t.owner,日期:t.deadline,状态:t.completed?"已完成":"未完成"}));
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(arr);
    XLSX.utils.book_append_sheet(wb,ws,"任务");
    XLSX.writeFile(wb,`任务_${new Date().toLocaleDateString().replace(/\//g,'-')}.xlsx`);
    showNotification("导出成功","success");
}
function importTasksFromExcel() {
    const ipt = document.createElement("input");
    ipt.type = "file";
    ipt.accept = ".xlsx,.xls";
    ipt.onchange = e => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
            const wb = XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            const add = {};
            data.forEach((row,i)=>{
                if (!row.任务) return;
                const id = Date.now()+""+i;
                add[id] = {
                    content:row.任务||"",
                    owner:row.负责人||"全员",
                    deadline:row.日期||todayStr,
                    completed:row.状态==="已完成",
                    timestamp:Date.now()
                };
            });
            allTasks = {...allTasks,...add};
            if (currentMode === "cloud" && firebaseDB) {
                firebaseDB.set(allTasks);
            } else {
                saveLocalTasks();
            }
            showNotification("导入成功","success");
            renderTasks();
        };
        r.readAsArrayBuffer(f);
    };
    ipt.click();
}

// ====================== AI分析 ======================
async function analyzeTasksWithZhipu() {
    const res = document.getElementById("ai-analysis-result");
    const con = document.getElementById("ai-analysis-content");
    res.classList.remove("hidden");
    con.innerText = "分析中...";
    try {
        const arr = Object.values(allTasks);
        if (!arr.length) { con.innerText = "无任务可分析"; return; }
        const g = {};
        arr.forEach(t=>{const o=t.owner||"全员";g[o]?g[o].push(t):g[o]=[t]});
        let p = "请分析任务分配是否合理，给出简洁建议：\n";
        for(const [o,ts] of Object.entries(g)) p+=`${o}:${ts.length}单\n`;
        const resp = await axios.post(CONFIG.zhipu.apiUrl,{
            model:CONFIG.zhipu.model,messages:[{role:"user",content:p}]
        },{headers:{Authorization:`Bearer ${CONFIG.zhipu.apiKey}`},timeout:10000});
        con.innerText = resp.data.choices[0].message.content;
        showNotification("分析完成","success");
    } catch(e) { con.innerText = "失败："+e.message; showNotification("分析失败","error"); }
}

// ====================== 交互 ======================
function initEventListeners() {
    const ipt = document.getElementById("taskInput");
    ipt.addEventListener("keydown",e=>{
        if (e.key==="Enter") {
            e.preventDefault();
            if (e.shiftKey) {
                const s = ipt.selectionStart;
                ipt.value = ipt.value.substring(0,s)+"\n"+ipt.value.substring(s);
                ipt.selectionStart = ipt.selectionEnd = s+1;
            } else processInput();
        }
    });
    document.getElementById("searchInput").addEventListener("input",renderTasks);
    document.getElementById("datePicker").addEventListener("change",()=>{renderTasks();renderFullMonthCalendar()});
}
function setView(v) {
    currentView = v;
    ["day","week","month"].forEach(t=>{
        const el = document.getElementById("btn-"+t);
        if (el) {
            el.classList.toggle("bg-white", t===v);
            el.classList.toggle("shadow-sm", t===v);
            el.classList.toggle("text-slate-900", t===v);
            el.classList.toggle("text-slate-500", t!==v);
        }
    });
    renderTasks();
}
function jumpToToday() {
    document.getElementById("datePicker").value = todayStr;
    setView("day");
}

window.onload = init;
</script>
</body>
</html>
